
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Rodrigues Shop | Elite Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap');
        body { background: #000; color: #888; font-family: 'Rajdhani', sans-serif; }
        .font-gamer { font-family: 'Orbitron', sans-serif; }
        .neon-green { color: #22c55e; }
        .card-monite { background: rgba(10,10,10,0.9); border: 1px solid #1a1a1a; transition: 0.3s; }
        .card-monite:hover { border-color: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.1); }
        #modal-pix { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .grid-bg { background-image: linear-gradient(#111 1px, transparent 1px), linear-gradient(90deg, #111 1px, transparent 1px); background-size: 40px 40px; position: fixed; inset: 0; z-index: -1; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <nav class="p-6 border-b border-zinc-900 bg-black/80 flex justify-between items-center sticky top-0 z-50">
        <div class="text-green-500 font-gamer text-xl italic tracking-tighter uppercase">monite</div>
        <div class="flex gap-6 text-[10px] font-bold uppercase tracking-[3px] text-white">
            <a href="#loja">Loja</a>
            <a href="#status">Status</a>
        </div>
    </nav>

    <section id="loja" class="py-24 px-6 text-center">
        <h1 class="text-6xl font-gamer text-white italic mb-10 tracking-tighter uppercase">Rodrigues <span class="neon-green">Shop</span></h1>
        <div class="grid md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            <div class="card-monite p-10 rounded-2xl">
                <h3 class="text-white font-bold text-xl mb-4 italic uppercase">Painel VIP (30D)</h3>
                <p class="text-3xl font-bold neon-green mb-8 font-gamer">R$ 59,90</p>
                <button onclick="processarVenda('Painel VIP', 59.90)" class="w-full bg-green-600 text-black font-bold py-4 rounded-lg hover:brightness-125 transition">COMPRAR AGORA</button>
            </div>
            <div class="card-monite p-10 rounded-2xl border-green-500">
                <h3 class="text-white font-bold text-xl mb-4 italic uppercase">Combo Permanente</h3>
                <p class="text-3xl font-bold neon-green mb-8 font-gamer">R$ 149,90</p>
                <button onclick="processarVenda('Combo Permanente', 149.90)" class="w-full bg-green-600 text-black font-bold py-4 rounded-lg hover:brightness-125 transition">COMPRAR AGORA</button>
            </div>
        </div>
    </section>

    <div id="modal-pix">
        <div class="bg-zinc-950 border border-zinc-800 p-8 rounded-3xl max-w-sm w-full text-center relative">
            <button onclick="fechar()" class="absolute top-6 right-6 text-zinc-600 hover:text-white"><i class="fas fa-times"></i></button>
            <h2 class="text-white font-gamer text-sm mb-6 italic tracking-tighter">PAGAMENTO <span class="text-green-500">PIX AUTOMÁTICO</span></h2>
            
            <div id="qrcode-area" class="bg-white p-3 inline-block rounded-xl mb-6 shadow-xl"></div>

            <div class="bg-black p-4 rounded-xl border border-zinc-800 mb-6 text-left">
                <p class="text-[8px] neon-green font-bold uppercase mb-2">Copia e Cola:</p>
                <div class="flex gap-2">
                    <input id="pix-input" readonly value="GERANDO..." class="w-full bg-transparent text-white text-[10px] outline-none overflow-hidden">
                    <button onclick="copy()" class="text-green-500"><i class="fas fa-copy"></i></button>
                </div>
            </div>

            <div class="flex items-center justify-center gap-3 text-xs italic">
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                <span id="status-label" class="text-zinc-500">Aguardando aprovação...</span>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "ep_efb82bc9f89f0c69daaa531eb8fd56d1";
        const CLIENT_ID = "eps_3d4800dac85c661d73c4b6322245b09d15eda5dbc86a34cc731f9ec55dcf23d1";

        async function processarVenda(produto, preco) {
            const email = prompt("E-mail para entrega da Key:");
            if(!email || !email.includes('@')) return alert("E-mail inválido!");

            document.getElementById('modal-pix').style.display = 'flex';
            
            try {
                // Chamada direta para gerar o Pix na sua conta Elite Pay
                const response = await fetch('https://api.elitepaybr.com/v1/checkout/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        client_id: CLIENT_ID,
                        amount: preco,
                        email: email,
                        reference: produto
                    })
                });

                const data = await response.json();
                
                // 2 & 3. QR Code e Copia e Cola Gerados
                document.getElementById('pix-input').value = data.pix_code;
                document.getElementById('qrcode-area').innerHTML = "";
                new QRCode(document.getElementById("qrcode-area"), { text: data.pix_code, width: 160, height: 160 });

                // 4 & 5. Aprovação e Envio
                monitorarPagamento(data.id, email, produto);

            } catch (err) {
                // FALLBACK SE A API ESTIVER FORA (DNS ERROR)
                console.error(err);
                alert("Erro ao conectar com a ElitePay. Verifique se o site está rodando em HTTPS.");
                document.getElementById('modal-pix').style.display = 'none';
            }
        }

        function monitorarPagamento(id, email, prod) {
            const check = setInterval(async () => {
                const res = await fetch(`https://api.elitepaybr.com/v1/checkout/status/${id}`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                const status = await res.json();

                if(status.paid === true) {
                    clearInterval(check);
                    document.getElementById('status-label').innerText = "PAGO COM SUCESSO!";
                    document.getElementById('status-label').className = "neon-green font-bold";
                    alert(`APROVADO! A Key de ${prod} foi enviada para ${email}`);
                }
            }, 5000);
        }

        function copy() {
            const input = document.getElementById('pix-input');
            input.select();
            document.execCommand('copy');
            alert("Pix copiado!");
        }

        function fechar() { document.getElementById('modal-pix').style.display = 'none'; }
    </script>
</body>
</html>
